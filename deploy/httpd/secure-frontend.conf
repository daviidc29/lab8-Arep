<VirtualHost *:80>
    ServerName frontend.example.com
    DocumentRoot /var/www/secure-frontend

    <Directory /var/www/secure-frontend>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    DirectoryIndex index.html
    ErrorLog /var/log/httpd/secure-frontend-error.log
    CustomLog /var/log/httpd/secure-frontend-access.log combined
</VirtualHost>
