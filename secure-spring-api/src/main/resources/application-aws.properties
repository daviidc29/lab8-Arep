server.port=${PORT:8443}
server.ssl.enabled=true
server.ssl.certificate=${SSL_CERTIFICATE}
server.ssl.certificate-private-key=${SSL_PRIVATE_KEY}

app.data-dir=${APP_DATA_DIR:/opt/secure-spring-api/data}
app.cors-allowed-origin=${ALLOWED_ORIGIN:https://tu-frontend}
app.security.token-ttl-minutes=${TOKEN_TTL_MINUTES:120}