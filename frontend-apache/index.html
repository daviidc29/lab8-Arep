<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Lab</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
    <script defer src="app.js"></script>
</head>
<body>
<div class="container">
    <header>
        <h1>Secure Lab</h1>
        <p class="small">API base URL: <span id="apiBaseUrlLabel">not loaded</span></p>
    </header>

    <section class="card">
        <h2>1. Register</h2>
        <form id="registerForm">
            <label>
                Username
                <input id="registerUsername" type="text" required minlength="3" maxlength="60">
            </label>
            <label>
                Password
                <input id="registerPassword" type="password" required minlength="8">
            </label>
            <button type="submit">Register</button>
        </form>
    </section>

    <section class="card">
        <h2>2. Login</h2>
        <form id="loginForm">
            <label>
                Username
                <input id="loginUsername" type="text" required>
            </label>
            <label>
                Password
                <input id="loginPassword" type="password" required>
            </label>
            <button type="submit">Login</button>
        </form>
    </section>

    <section class="card">
        <h2>3. Access secure service</h2>
        <div class="button-row">
            <button id="secureButton" type="button">Call secure endpoint</button>
            <button id="logoutButton" type="button">Logout</button>
        </div>
    </section>

    <section class="card">
        <h2>Status</h2>
        <pre id="output">Ready.</pre>
    </section>
</div>
</body>
</html>
